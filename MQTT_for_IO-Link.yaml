asyncapi: 2.6.0
info:
  title: MQTT for IO-Link Master
  version: 0.0.2
  description: >
    This is the _AsyncAPI_ specification of MQTT which are published by the IO-Link Master.
  termsOfService: "https://www.io-link.com"
  contact:
    name: "IO-Link Community"
    email: info@io-link.com
    url: "http://www.io-link.com"
  license:
    name: Apache 2.0
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
defaultContentType: application/json
servers:
  iol-master:
    url: "{iolm-ip}:{port}"
    protocol: mqtt
    protocolVersion: 3.1.1
    description: io-link master as MQTT client
    security:
      - user-password: []
    variables:
      iolm-ip:
        default: "192.168.0.1"
      port:
        enum:
          - "1883"
          - "8883"
        default: "1883"
channels:
  /{originatorId}/{deviceAlias}/processdata:
    servers:
      - "iol-master"
    parameters:
      originatorId:
        schema:
          $ref: "./schemas.yaml#/schemas/originatorId"
      deviceAlias:
        schema:
          $ref: "./schemas.yaml#/schemas/deviceAlias"
      mqtt-iol-master:
        description: Master addrees.
        schema:
          $ref: "./schemas.yaml#/schemas/mqtt-iol-master"
    publish:
      summary: Provides process data from connected iolink device.
      operationId: deviceProcessData
      message:
        name: ProcessData
        payload:
          $ref: "./schemas.yaml#/schemas/processDataValue"
        examples:
          - payload:
              $ref: "./examples.yaml#/examples/processDataValue/byteArray"
          - payload:
              $ref: "./examples.yaml#/examples/processDataValue/iodd"
          - payload:
              $ref: "./examples.yaml#/examples/processDataValue/sio"
  /{originatorId}/{deviceAlias}/events:
    servers:
      - "iol-master"
    parameters:
      originatorId:
        schema:
          $ref: "./schemas.yaml#/schemas/originatorId"
      deviceAlias:
        schema:
          $ref: "./schemas.yaml#/schemas/deviceAlias"
    publish:
      summary: Informs about occurred events of the connected iolink device.
      operationId: deviceEvent
      message:
        name: Event
        payload:
          $ref: "./schemas.yaml#/schemas/deviceEvent"
components:
  securitySchemes:
    user-password:
      type: userPassword
